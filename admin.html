<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP Reproducción - Admin</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f7f4ed; color:#111; }
    .page { max-width:420px; margin:1rem auto; padding:0.5rem; }
    .panel { text-align:center; margin-bottom:1rem; }
    .panel h1 { margin:0; font-size:1.7rem; }
    .menu-btn { width:100%; padding:0.85rem; margin:0.6rem 0; background:#ddd; border:1px solid #999; font-size:1rem; cursor:pointer; }
    .menu-btn:hover { background:#ccc; }
    .section { display:none; max-width:420px; margin:0 auto; border:1px solid #888; background:#fff; padding:0.9rem; }
    .section h2 { margin-top:0; font-size:1.2rem; }
    .field { margin-bottom:0.6rem; }
    .field input { width:100%; padding:0.55rem; border:1px solid #999; }
    .field label { display:block; font-size:0.95rem; margin-bottom:0.2rem; }
    .button-row { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .button-row button, .back-btn { flex:1; padding:0.75rem; background:#e2e0d4; border:1px solid #999; cursor:pointer; }
    .button-row button:hover, .back-btn:hover { background:#cfcbbb; }
    .box { border:1px solid #999; background:#f7f4ed; padding:0.75rem; margin-top:0.75rem; max-height:320px; overflow:auto; }
    .box div { margin-bottom:0.45rem; }
    .estado-btn { display:inline-block; padding:0.35rem 0.45rem; margin:0.15rem 0.1rem 0 0; border:1px solid #777; background:#e8e7dc; color:#111; cursor:pointer; font-size:0.85rem; border-radius:4px; }
    .estado-btn:hover { background:#d6d4c8; }
    .service-disabled { opacity:0.6; }
    .footer { margin-top:0.75rem; text-align:center; }
    .back-btn { width:100%; }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <h1>APP Reproducción</h1>
      <button class="menu-btn" id="btn-menu-servicios">Servicios</button>
      <button class="menu-btn" id="btn-menu-pedidos">Pedidos</button>
      <button class="menu-btn" id="btn-menu-tasa">Tasa BCV</button>
    </div>

    <div id="section-servicios" class="section">
      <h2>Gestión de Servicios - Centro de Reproducción</h2>
      <div class="field"><label>Código:</label><input id="svcCodigo" placeholder="Ej: R01"></div>
      <div class="field"><label>Servicio/Producto:</label><input id="svcNombre" placeholder="Ej: Fotocopia B/N"></div>
      <div class="field"><label>Precio ($):</label><input id="svcPrecio" placeholder="Ej: 0.12" type="number" step="0.01"></div>
      <div class="button-row">
        <button id="svcAdd">[Agregar]</button>
        <button id="svcRemove">[Eliminar]</button>
      </div>
      <h3>Servicios Disponibles</h3>
      <div class="box">
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr>
              <th style="border:1px solid #999;padding:6px">Código</th>
              <th style="border:1px solid #999;padding:6px">Nombre</th>
              <th style="border:1px solid #999;padding:6px">Precio</th>
              <th style="border:1px solid #999;padding:6px">Disponible</th>
            </tr>
          </thead>
          <tbody id="svcList"></tbody>
        </table>
      </div>
      <div class="footer"><button class="back-btn" id="svcBack">[Volver]</button></div>
    </div>

    <div id="section-pedidos" class="section">
      <h2>APP Reproducción - Gestión de Pedidos</h2>
      <div class="box" id="admin-summary">
        <strong>Requerimientos:</strong>
    
        <div id="admin-summary-data" style="margin-top:0.75rem;"></div>
      </div>
      <div class="field"><label>ID Pedido:</label><input id="sel-hash-codigo" placeholder="Buscar ID"></div>
      <div class="button-row">
        <button id="btn-aceptar">[Aceptar]</button>
        <button id="btn-cancelar">[Cancelar]</button>
      </div>
      <div class="box" id="ordersContainer">Cargando pedidos...</div>
      <div class="footer"><button class="back-btn" id="pedBack">[Volver]</button></div>
    </div>

    <div id="section-tasa" class="section">
      <h2>Tasa BCV</h2>
      <div class="field"><label>Tasa:</label><input id="tasa-bcv" value="30"></div>
      <div class="footer"><button class="back-btn" id="tasaBack">[Volver]</button></div>
    </div>
  </div>

  <script type="module" src="./dist/index.js"></script>
</body>
</html>
